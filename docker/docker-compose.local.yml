# Local development — Postgres-only for use with `npm run dev`
# Usage: npm run local:db (start) / npm run local:db:down (stop)
# Then run: npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: bahub-local-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bahub
      POSTGRES_PASSWORD: bahub_local
      POSTGRES_DB: bahub
    volumes:
      - pgdata-local:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata-local:
