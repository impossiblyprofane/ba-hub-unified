version: '3.8'

# Parameterized for dev/prod deployment. Source .env for environment-specific values.
# Default values match development. CI/CD generates .env per environment.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-bahub}-postgres
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-bahub}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-bahub_dev}
      POSTGRES_DB: ${PG_DB:-bahub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ba-hub-network

  database:
    build:
      context: ..
      dockerfile: docker/database.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-bahub}-database
    ports:
      - "${PORT_DATABASE:-3002}:${PORT_DATABASE:-3002}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT_DATABASE:-3002}
      - DATABASE_URL=postgresql://${PG_USER:-bahub}:${PG_PASSWORD:-bahub_dev}@postgres:5432/${PG_DB:-bahub}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - ba-hub-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-bahub}-backend
    ports:
      - "${PORT_BACKEND:-3001}:${PORT_BACKEND:-3001}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT_BACKEND:-3001}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - DATABASE_SERVICE_URL=http://database:${PORT_DATABASE:-3002}
      - RELOAD_SECRET=${RELOAD_SECRET:-}
      - STATS_API_URL=${STATS_API_URL:-https://api.brokenarrowgame.tech}
      - STATS_PARTNER_TOKEN=${STATS_PARTNER_TOKEN:-}
      - STATS_COLLECTION_ENABLED=${STATS_COLLECTION_ENABLED:-true}
      - ENCRYPT_API=${ENCRYPT_API:-false}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENCRYPTION_IV=${ENCRYPTION_IV:-}
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - ba-hub-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://backend:3001/graphql}
        - VITE_WS_URL=${VITE_WS_URL:-ws://backend:3001/graphql}
        - VITE_ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
        - VITE_ENCRYPTION_IV=${ENCRYPTION_IV:-}
    container_name: ${COMPOSE_PROJECT_NAME:-bahub}-frontend
    ports:
      - "${PORT_FRONTEND:-3000}:${PORT_FRONTEND:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT_FRONTEND:-3000}
      - SITE_URL=${SITE_URL:-http://localhost:3000}
      - API_URL=http://backend:${PORT_BACKEND:-3001}/graphql
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENCRYPTION_IV=${ENCRYPTION_IV:-}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ba-hub-network

volumes:
  pgdata:

networks:
  ba-hub-network:
    driver: bridge
