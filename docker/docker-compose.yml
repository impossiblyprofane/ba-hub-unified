version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bahub
      POSTGRES_PASSWORD: bahub_dev
      POSTGRES_DB: bahub
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ba-hub-network

  database:
    build:
      context: ..
      dockerfile: docker/database.Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://bahub:bahub_dev@postgres:5432/bahub
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - ba-hub-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_SERVICE_URL=http://database:3002
      - RELOAD_SECRET=${RELOAD_SECRET:-}
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - ba-hub-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        - VITE_API_URL=http://backend:3001/graphql
        - VITE_WS_URL=ws://backend:3001/graphql
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INTERNAL_API_URL=http://backend:3001/graphql
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ba-hub-network

volumes:
  pgdata:

networks:
  ba-hub-network:
    driver: bridge
