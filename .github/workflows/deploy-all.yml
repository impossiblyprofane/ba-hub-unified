name: Deploy All Services

on:
  push:
    branches: [main, dev]
    paths:
      - 'shared/**'
      - 'docker/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Discord — Starting
        uses: appleboy/discord-action@v1.0.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          message: '🚀 Starting full stack deploy (${{ github.ref_name }})\nCommit: ${{ github.event.head_commit.message }}'

      - uses: actions/checkout@v4

      - name: Generate .env
        run: |
          ENV=${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
          cat << 'ENVEOF' > docker/.env
          COMPOSE_PROJECT_NAME=bahub-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
          NODE_ENV=production
          PORT_FRONTEND=${{ github.ref == 'refs/heads/main' && '3000' || '3100' }}
          PORT_BACKEND=${{ github.ref == 'refs/heads/main' && '3001' || '3101' }}
          PORT_DATABASE=${{ github.ref == 'refs/heads/main' && '3002' || '3102' }}
          PORT_POSTGRES=${{ github.ref == 'refs/heads/main' && '5432' || '5433' }}
          PG_USER=${{ secrets.PG_USER }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          PG_DB=${{ secrets.PG_DB }}
          VITE_API_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.DEV_API_URL }}
          VITE_WS_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_WS_URL || secrets.DEV_WS_URL }}
          SITE_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_SITE_URL || secrets.DEV_SITE_URL }}
          FRONTEND_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_FRONTEND_URL || secrets.DEV_FRONTEND_URL }}
          STATS_API_URL=https://api.brokenarrowgame.tech
          STATS_PARTNER_TOKEN=${{ secrets.STATS_PARTNER_TOKEN }}
          STATS_COLLECTION_ENABLED=${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          ENCRYPT_API=true
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV=${{ secrets.ENCRYPTION_IV }}
          ENVEOF

      - name: Transfer to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: ./*
          target: /root/ba-hub/${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}/
          strip_components: 0

      - name: Build and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root/ba-hub/${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}/docker
            echo "🏗️ Building all images..."
            docker compose --env-file .env build --no-cache
            echo "🛑 Stopping existing containers..."
            docker compose --env-file .env down
            echo "🚀 Starting containers..."
            docker compose --env-file .env up -d
            echo "🧹 Pruning unused images..."
            docker image prune -f
            echo "✅ All services deployed!"

      - name: Discord — Success
        uses: appleboy/discord-action@v1.0.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          message: '✅ Full stack deployed (${{ github.ref_name }})'

      - name: Discord — Failed
        if: failure()
        uses: appleboy/discord-action@v1.0.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          message: '❌ Full stack deploy FAILED (${{ github.ref_name }})'
