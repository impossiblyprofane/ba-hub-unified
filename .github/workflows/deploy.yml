name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  # Run CI checks before deploying
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "DB_CONTAINER=bahub-prod-database" >> $GITHUB_OUTPUT
            echo "DB_PORT=3002" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.dev.yml" >> $GITHUB_OUTPUT
            echo "DB_CONTAINER=bahub-dev-database" >> $GITHUB_OUTPUT
            echo "DB_PORT=3102" >> $GITHUB_OUTPUT
          fi

      - name: Generate .env
        run: |
          cat > docker/.env <<ENVEOF
          PG_USER=${{ secrets.PG_USER }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          PG_DB=${{ github.ref == 'refs/heads/main' && secrets.PG_DB || secrets.PG_DB_DEV || secrets.PG_DB }}
          VITE_API_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.DEV_API_URL }}
          VITE_WS_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_WS_URL || secrets.DEV_WS_URL }}
          SITE_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_SITE_URL || secrets.DEV_SITE_URL }}
          FRONTEND_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_FRONTEND_URL || secrets.DEV_FRONTEND_URL }}
          STATS_PARTNER_TOKEN=${{ secrets.STATS_PARTNER_TOKEN }}
          ENCRYPT_API=true
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV=${{ secrets.ENCRYPTION_IV }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' docker/.env

      - name: Transfer to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: ./*
          target: /root/ba-hub/${{ steps.env.outputs.ENV }}/
          strip_components: 0

      - name: Build and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            ENV=${{ steps.env.outputs.ENV }}
            COMPOSE="docker compose -p bahub-$ENV -f ${{ steps.env.outputs.COMPOSE_FILE }} --env-file .env"
            DB_CONTAINER=${{ steps.env.outputs.DB_CONTAINER }}
            cd /root/ba-hub/$ENV/docker

            echo "=== Building and starting ($ENV) ==="
            $COMPOSE up -d --build

            echo "=== Waiting for database service to be healthy ==="
            for i in $(seq 1 30); do
              if docker exec $DB_CONTAINER wget -qO- http://localhost:${{ steps.env.outputs.DB_PORT }}/health 2>/dev/null | grep -q '"ok"'; then
                echo "  Database service is healthy."
                break
              fi
              echo "  Waiting... ($i/30)"
              sleep 2
            done

            docker image prune -f
            echo "=== Deploy complete ($ENV) ==="
