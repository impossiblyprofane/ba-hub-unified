# Dev-only: starts just PostgreSQL for local development.
# Usage:  npm run dev:db        (starts PostgreSQL in background)
#         npm run dev:db:stop   (stops it)
#         npm run dev:migrate   (creates/updates tables)
#         npm run dev            (starts backend + frontend + database service)

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bahub
      POSTGRES_PASSWORD: bahub_dev
      POSTGRES_DB: bahub
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata_dev:
